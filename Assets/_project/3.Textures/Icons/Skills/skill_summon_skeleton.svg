<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#060310"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#8855cc" stroke-width="1.2" opacity="0.9"/>
  <!-- 소환 마법진 -->
  <circle cx="24" cy="24" r="18" fill="#8855cc" opacity="0.08" filter="url(#glow)"/>
  <circle cx="24" cy="38" rx="12" ry="4" fill="none" stroke="#8855cc" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- 해골 — 두개골 -->
  <ellipse cx="24" cy="16" rx="10" ry="9" fill="#ccccaa" stroke="#999977" stroke-width="0.8"/>
  <!-- 두개골 하이라이트 -->
  <ellipse cx="21" cy="13" rx="4" ry="3" fill="white" opacity="0.2"/>
  <!-- 눈 소켓 (빛나는) -->
  <ellipse cx="20" cy="15" rx="3" ry="3.5" fill="#220033" stroke="#8855cc" stroke-width="0.5"/>
  <ellipse cx="28" cy="15" rx="3" ry="3.5" fill="#220033" stroke="#8855cc" stroke-width="0.5"/>
  <ellipse cx="20" cy="15" rx="1.5" ry="1.8" fill="#9933ff" opacity="0.8" filter="url(#glow)"/>
  <ellipse cx="28" cy="15" rx="1.5" ry="1.8" fill="#9933ff" opacity="0.8" filter="url(#glow)"/>
  <!-- 코 -->
  <path d="M23,19 L24,21 L25,19" fill="none" stroke="#888866" stroke-width="0.8"/>
  <!-- 이빨 -->
  <rect x="17" y="23" width="14" height="3" rx="1.5" fill="#888866" stroke="#666644" stroke-width="0.5"/>
  <line x1="20" y1="23" x2="20" y2="26" stroke="#ccccaa" stroke-width="0.8"/>
  <line x1="24" y1="23" x2="24" y2="26" stroke="#ccccaa" stroke-width="0.8"/>
  <line x1="28" y1="23" x2="28" y2="26" stroke="#ccccaa" stroke-width="0.8"/>
  <!-- 소환 파티클 -->
  <circle cx="10" cy="30" r="1.5" fill="#9933ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="38" cy="28" r="1.5" fill="#9933ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="14" cy="40" r="1.2" fill="#9933ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="34" cy="42" r="1.2" fill="#9933ff" opacity="0.5" filter="url(#glow)"/>
  <!-- 상승 선 -->
  <line x1="24" y1="44" x2="24" y2="28" stroke="#8855cc" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.5"/>
</svg>
