<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e1a04"/>
      <stop offset="100%" stop-color="#060502"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#ccbb11" stroke-width="1.2" opacity="0.9"/>
  <!-- 속도 잔상 (왼쪽에서 오른쪽으로) -->
  <line x1="4" y1="22" x2="22" y2="22" stroke="#ffee44" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
  <line x1="4" y1="26" x2="18" y2="26" stroke="#ffee44" stroke-width="3" stroke-linecap="round" opacity="0.12"/>
  <line x1="4" y1="30" x2="20" y2="30" stroke="#ffee44" stroke-width="2" stroke-linecap="round" opacity="0.1"/>
  <!-- 속도선 -->
  <line x1="6" y1="18" x2="24" y2="18" stroke="#ffee44" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="22" x2="22" y2="22" stroke="#ffee44" stroke-width="1.5" opacity="0.4"/>
  <line x1="6" y1="26" x2="20" y2="26" stroke="#ffee44" stroke-width="1.5" opacity="0.35"/>
  <!-- 검 (빠른 베기 — 대각선) -->
  <rect x="16" y="6" width="6" height="30" rx="3" fill="#d8d8d8" stroke="#aaa" stroke-width="0.7" transform="rotate(25,19,21)"/>
  <!-- 검 능선 -->
  <rect x="18" y="7" width="2" height="28" rx="1" fill="white" opacity="0.45" transform="rotate(25,19,21)"/>
  <!-- 검 가드 -->
  <rect x="10" y="21" width="18" height="4" rx="2" fill="#c8a040" stroke="#8b6820" stroke-width="0.5" transform="rotate(25,19,23)"/>
  <!-- 베기 이펙트 (노란 섬광) -->
  <path d="M34,8 Q42,16 38,26 Q44,18 34,8" fill="#ffee44" opacity="0.7" filter="url(#glow)"/>
  <path d="M36,10 Q44,20 40,30 Q46,22 36,10" fill="#ffcc22" opacity="0.4"/>
  <!-- 베기 흔적 라인 -->
  <line x1="30" y1="10" x2="44" y2="30" stroke="#ffee44" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="34" y1="8" x2="46" y2="24" stroke="#ffcc22" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
