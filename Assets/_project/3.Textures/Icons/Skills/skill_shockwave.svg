  <path d="M8,32 Q16,8 40,24" fill="none" stroke="#ff6600" stroke-width="8" stroke-linecap="round" opacity="0.08" filter="url(#glow)"/>
  <!-- 발원 지점 -->
  <circle cx="8" cy="36" r="7" fill="#ff6622" opacity="0.18" filter="url(#glow)"/>
  <circle cx="8" cy="36" r="5.5" fill="#3a1400" stroke="#ff8833" stroke-width="1.5"/>
