  <line x1="6" y1="33" x2="6" y2="37" stroke="#aaa" stroke-width="0.7" opacity="0.5"/>
  <line x1="8.5" y1="33" x2="8.5" y2="37" stroke="#aaa" stroke-width="0.7" opacity="0.5"/>
  <line x1="11" y1="33" x2="11" y2="37" stroke="#aaa" stroke-width="0.7" opacity="0.5"/>
  <!-- 파편 -->
  <circle cx="36" cy="12" r="2" fill="#ff8833" opacity="0.6"/>
