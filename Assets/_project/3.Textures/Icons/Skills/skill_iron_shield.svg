<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e2030"/>
      <stop offset="100%" stop-color="#03080e"/>
    </radialGradient>
    <linearGradient id="steelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aaaacc"/>
      <stop offset="40%" stop-color="#778899"/>
      <stop offset="100%" stop-color="#334455"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88aacc"/>
      <stop offset="100%" stop-color="#446688"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#4488bb" stroke-width="1.2" opacity="0.9"/>
  <!-- 방어 글로우 -->
  <path d="M24,5 L42,11 L42,30 Q42,44 24,46 Q6,44 6,30 L6,11 Z" fill="#88aacc" opacity="0.08" filter="url(#glow)"/>
  <!-- 철벽 방패 본체 -->
  <path d="M24,5 L42,12 L42,30 Q42,44 24,46 Q6,44 6,30 L6,12 Z" fill="url(#steelGrad)" stroke="url(#rimGrad)" stroke-width="2"/>
  <!-- 철판 질감 선들 -->
  <line x1="14" y1="12" x2="14" y2="40" stroke="#99aacc" stroke-width="0.8" opacity="0.2"/>
  <line x1="24" y1="8" x2="24" y2="44" stroke="#99aacc" stroke-width="0.8" opacity="0.2"/>
  <line x1="34" y1="12" x2="34" y2="40" stroke="#99aacc" stroke-width="0.8" opacity="0.2"/>
  <line x1="8" y1="20" x2="40" y2="20" stroke="#99aacc" stroke-width="0.8" opacity="0.2"/>
  <line x1="7" y1="30" x2="41" y2="30" stroke="#99aacc" stroke-width="0.8" opacity="0.2"/>
  <!-- 리벳 (철판 볼트) -->
  <circle cx="13" cy="14" r="2" fill="#aaaacc" stroke="#667788" stroke-width="0.5"/>
  <circle cx="35" cy="14" r="2" fill="#aaaacc" stroke="#667788" stroke-width="0.5"/>
  <circle cx="9" cy="26" r="2" fill="#aaaacc" stroke="#667788" stroke-width="0.5"/>
  <circle cx="39" cy="26" r="2" fill="#aaaacc" stroke="#667788" stroke-width="0.5"/>
  <circle cx="13" cy="38" r="2" fill="#aaaacc" stroke="#667788" stroke-width="0.5"/>
  <circle cx="35" cy="38" r="2" fill="#aaaacc" stroke="#667788" stroke-width="0.5"/>
  <!-- 중앙 철 엠블럼 -->
  <circle cx="24" cy="26" r="8" fill="#334455" stroke="#88aacc" stroke-width="1.5"/>
  <!-- 방어 심볼 (검 막는 형태) -->
  <polygon points="24,19 27,26 24,33 21,26" fill="#88aacc" opacity="0.8"/>
  <circle cx="24" cy="26" r="3" fill="#aaccdd"/>
  <circle cx="23" cy="25" r="1.2" fill="white" opacity="0.5"/>
</svg>
