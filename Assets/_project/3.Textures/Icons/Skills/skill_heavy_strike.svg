<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#4a2010"/>
      <stop offset="100%" stop-color="#0e0604"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#cc5520" stroke-width="1.2" opacity="0.9"/>
  <!-- 충격 이펙트 (방사선) -->
  <circle cx="24" cy="28" r="14" fill="#ff6633" opacity="0.12" filter="url(#glow)"/>
  <line x1="10" y1="40" x2="15" y2="32" stroke="#ff9955" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="40" x2="33" y2="32" stroke="#ff9955" stroke-width="1.5" opacity="0.5"/>
  <line x1="24" y1="42" x2="24" y2="33" stroke="#ff9955" stroke-width="1.5" opacity="0.5"/>
  <!-- 해머 머리 -->
  <rect x="13" y="8" width="22" height="16" rx="3" fill="#888" stroke="#555" stroke-width="1"/>
  <rect x="13" y="8" width="22" height="7" rx="3" fill="#aaa" opacity="0.6"/>
  <!-- 해머 손잡이 -->
  <rect x="21" y="24" width="6" height="16" rx="2" fill="#8b5a20" stroke="#5a3010" stroke-width="0.7"/>
  <line x1="21" y1="28" x2="27" y2="28" stroke="#5a3010" stroke-width="0.8" opacity="0.6"/>
  <line x1="21" y1="33" x2="27" y2="33" stroke="#5a3010" stroke-width="0.8" opacity="0.6"/>
  <!-- 충격 아이콘 (아래) -->
  <path d="M16,36 L21,30 L19,32 L24,24 L22,28 L28,22 L26,27 L32,22" fill="none" stroke="#ffaa44" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
