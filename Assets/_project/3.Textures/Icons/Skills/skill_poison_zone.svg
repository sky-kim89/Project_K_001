<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e2a06"/>
      <stop offset="100%" stop-color="#030802"/>
    </radialGradient>
    <radialGradient id="poisonGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#88ee22"/>
      <stop offset="100%" stop-color="#225500"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#66aa11" stroke-width="1.2" opacity="0.9"/>
  <!-- 독 지대 바닥 -->
  <ellipse cx="24" cy="36" rx="18" ry="6" fill="#225500" opacity="0.6"/>
  <ellipse cx="24" cy="36" rx="18" ry="6" fill="#88ee22" opacity="0.1" filter="url(#glow)"/>
  <!-- 독 구름 -->
  <circle cx="18" cy="28" r="9" fill="url(#poisonGrad)" opacity="0.5"/>
  <circle cx="28" cy="26" r="10" fill="url(#poisonGrad)" opacity="0.5"/>
  <circle cx="22" cy="24" r="8" fill="url(#poisonGrad)" opacity="0.4"/>
  <!-- 독 구름 글로우 -->
  <circle cx="24" cy="26" r="14" fill="#66ee00" opacity="0.1" filter="url(#glow)"/>
  <!-- 해골 심볼 (독 표시) -->
  <circle cx="24" cy="24" r="7" fill="#1a3a00" stroke="#88ee22" stroke-width="1"/>
  <circle cx="21" cy="22" rx="2" ry="2" fill="#88ee22" opacity="0.9"/>
  <circle cx="27" cy="22" rx="2" ry="2" fill="#88ee22" opacity="0.9"/>
  <path d="M21,27 L27,27" stroke="#88ee22" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="26" x2="22" y2="28" stroke="#88ee22" stroke-width="1" opacity="0.7"/>
  <line x1="24" y1="26" x2="24" y2="28" stroke="#88ee22" stroke-width="1" opacity="0.7"/>
  <line x1="26" y1="26" x2="26" y2="28" stroke="#88ee22" stroke-width="1" opacity="0.7"/>
  <!-- 독 방울 -->
  <ellipse cx="12" cy="18" rx="2.5" ry="3.5" fill="#88ee22" opacity="0.6"/>
  <circle cx="12" cy="16" r="2" fill="#aaffaa" opacity="0.5"/>
  <ellipse cx="36" cy="20" rx="2" ry="3" fill="#88ee22" opacity="0.5"/>
  <circle cx="36" cy="18" r="1.5" fill="#aaffaa" opacity="0.4"/>
  <!-- 이속 감소 화살표 (감소) -->
  <line x1="8" y1="42" x2="14" y2="42" stroke="#88ee22" stroke-width="1.5" opacity="0.6"/>
  <polygon points="8,42 12,40 12,44" fill="#88ee22" opacity="0.6"/>
</svg>
