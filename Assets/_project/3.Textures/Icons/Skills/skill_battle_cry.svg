<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a1e04"/>
      <stop offset="100%" stop-color="#080602"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#cc9922" stroke-width="1.2" opacity="0.9"/>
  <!-- 함성 음파 -->
  <path d="M28,12 Q36,24 28,36" fill="none" stroke="#ffcc44" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M32,8 Q44,24 32,40" fill="none" stroke="#ffcc44" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M36,6 Q50,24 36,42" fill="none" stroke="#ffaa22" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <!-- 함성 파 글로우 -->
  <path d="M28,12 Q36,24 28,36" fill="none" stroke="#ffee88" stroke-width="4" stroke-linecap="round" opacity="0.1" filter="url(#glow)"/>
  <!-- 인물 머리 -->
  <circle cx="16" cy="16" r="5" fill="#ddd" stroke="#aaa" stroke-width="0.8"/>
  <!-- 머리 하이라이트 -->
  <circle cx="14" cy="14" r="2" fill="white" opacity="0.3"/>
  <!-- 입 (소리 지르는) -->
  <ellipse cx="16" cy="18" rx="3" ry="2" fill="#cc3333"/>
  <!-- 몸통 -->
  <line x1="16" y1="21" x2="16" y2="32" stroke="#ddd" stroke-width="4" stroke-linecap="round"/>
  <!-- 팔 들어올린 포즈 (함성) -->
  <line x1="16" y1="24" x2="8" y2="18" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="24" x2="24" y2="20" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
  <!-- 다리 -->
  <line x1="16" y1="32" x2="11" y2="40" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
  <line x1="16" y1="32" x2="21" y2="40" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
  <!-- 공격력 업 화살표 (아군들에게) -->
  <polygon points="8,42 6,36 10,36" fill="#ffcc44"/>
  <line x1="8" y1="36" x2="8" y2="28" stroke="#ffcc44" stroke-width="1.5" stroke-linecap="round"/>
</svg>
