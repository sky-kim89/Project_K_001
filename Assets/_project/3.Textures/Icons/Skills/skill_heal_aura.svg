<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0a2e0a"/>
      <stop offset="100%" stop-color="#020a02"/>
    </radialGradient>
    <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#116622"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#22aa44" stroke-width="1.2" opacity="0.9"/>
  <!-- 오라 방사 -->
  <circle cx="24" cy="24" r="20" fill="#22ff66" opacity="0.07" filter="url(#glow)"/>
  <circle cx="24" cy="24" r="18" fill="none" stroke="#22cc55" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <circle cx="24" cy="24" r="14" fill="none" stroke="#33dd66" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <!-- 중앙 십자 (치유 심볼) -->
  <rect x="20" y="12" width="8" height="24" rx="3" fill="url(#auraGrad)" stroke="#22aa44" stroke-width="0.5"/>
  <rect x="12" y="20" width="24" height="8" rx="3" fill="url(#auraGrad)" stroke="#22aa44" stroke-width="0.5"/>
  <!-- 중앙 하이라이트 -->
  <circle cx="24" cy="24" r="5" fill="#88ffaa" opacity="0.7"/>
  <circle cx="22" cy="22" r="2.5" fill="white" opacity="0.55"/>
  <!-- 힐 파티클 -->
  <circle cx="10" cy="16" r="2" fill="#44ff88" opacity="0.7" filter="url(#glow)"/>
  <circle cx="38" cy="14" r="1.5" fill="#44ff88" opacity="0.6" filter="url(#glow)"/>
  <circle cx="8" cy="32" r="1.5" fill="#44ff88" opacity="0.5" filter="url(#glow)"/>
  <circle cx="40" cy="34" r="2" fill="#44ff88" opacity="0.6" filter="url(#glow)"/>
  <!-- 상승 파티클 -->
  <line x1="14" y1="38" x2="12" y2="30" stroke="#44ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="38" x2="36" y2="30" stroke="#44ff88" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
</svg>
