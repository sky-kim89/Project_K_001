<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#10303a"/>
      <stop offset="100%" stop-color="#03090e"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#22aacc" stroke-width="1.2" opacity="0.9"/>
  <!-- 속도선 -->
  <line x1="4" y1="20" x2="18" y2="20" stroke="#22aacc" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="24" x2="14" y2="24" stroke="#22aacc" stroke-width="1.5" opacity="0.3"/>
  <line x1="4" y1="28" x2="18" y2="28" stroke="#22aacc" stroke-width="1.5" opacity="0.4"/>
  <!-- 돌격 병사 실루엣 (오른쪽을 향해 달리는) -->
  <!-- 방패 -->
  <path d="M28,16 L38,20 L38,30 Q38,38 28,40 Q18,38 18,30 L18,20 Z" fill="#1a7a9a" stroke="#22aacc" stroke-width="1.5"/>
  <path d="M28,19 L35,22 L35,30 Q35,36 28,38" fill="none" stroke="#44ccdd" stroke-width="0.7" opacity="0.5"/>
