  <circle cx="28" cy="29" r="5" fill="#0a4a5a" stroke="#22aacc" stroke-width="0.8"/>
  <polygon points="28,24 31,29 28,34 25,29" fill="#44ccdd" opacity="0.8"/>
  <!-- 돌격 화살표 -->
  <polygon points="44,24 36,18 36,22 30,22 30,26 36,26 36,30" fill="#22aacc" stroke="#0088aa" stroke-width="0.5"/>
  <!-- 글로우 -->
  <polygon points="44,24 36,18 36,22 30,22 30,26 36,26 36,30" fill="#44ccff" opacity="0.2" filter="url(#glow)"/>
</svg>
