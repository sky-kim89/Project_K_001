<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a1a04"/>
      <stop offset="100%" stop-color="#080502"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#cc8822" stroke-width="1.2" opacity="0.9"/>
  <!-- 병사 실루엣 (희미하게, 사라지는 느낌) -->
  <circle cx="16" cy="30" r="4" fill="#8b6020" opacity="0.5"/>
  <line x1="16" y1="34" x2="16" y2="42" stroke="#8b6020" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="36" x2="12" y2="40" stroke="#8b6020" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="16" y1="36" x2="20" y2="40" stroke="#8b6020" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- 에너지가 위로 올라가는 표시 -->
  <line x1="16" y1="28" x2="32" y2="10" stroke="#ffaa22" stroke-width="2" stroke-linecap="round" stroke-dasharray="3,2" opacity="0.7"/>
  <!-- 위로 상승하는 파워 구슬 -->
  <circle cx="32" cy="10" r="5" fill="#ffcc44" opacity="0.3" filter="url(#glow)"/>
  <circle cx="32" cy="10" r="4" fill="#ffaa22" stroke="#cc7700" stroke-width="0.8"/>
  <circle cx="30" cy="8" r="1.5" fill="white" opacity="0.6"/>
  <!-- 장군 (오른쪽) 강화 이펙트 -->
  <circle cx="36" cy="30" r="6" fill="#ffaa22" opacity="0.1" filter="url(#glow)"/>
  <circle cx="36" cy="24" r="3.5" fill="#ddd" stroke="#aaa" stroke-width="0.7"/>
  <line x1="36" y1="27.5" x2="36" y2="35" stroke="#ddd" stroke-width="3" stroke-linecap="round"/>
  <!-- 장군 강화 상승 화살표 -->
  <polygon points="36,16 33,22 39,22" fill="#ffcc44"/>
  <polygon points="36,12 33,18 39,18" fill="#ffaa22" opacity="0.7"/>
  <!-- 흡수 파티클 -->
  <circle cx="22" cy="20" r="1.5" fill="#ffcc44" opacity="0.6" filter="url(#glow)"/>
  <circle cx="26" cy="16" r="1.2" fill="#ffcc44" opacity="0.5" filter="url(#glow)"/>
</svg>
