<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#081830"/>
      <stop offset="100%" stop-color="#020509"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="48" height="48" rx="8" fill="url(#bg)"/>
  <rect width="48" height="48" rx="8" fill="none" stroke="#4488cc" stroke-width="1.2" opacity="0.9"/>
  <!-- 글로우 -->
  <circle cx="24" cy="24" r="18" fill="#88ccff" opacity="0.08" filter="url(#glow)"/>
  <!-- 눈결정 — 6각 구조 -->
  <!-- 중심 원 -->
  <circle cx="24" cy="24" r="4" fill="#aaddff" stroke="#88bbff" stroke-width="0.8"/>
  <!-- 6개 주축 -->
  <line x1="24" y1="6" x2="24" y2="42" stroke="#aaddff" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="15" x2="39" y2="33" stroke="#aaddff" stroke-width="2" stroke-linecap="round"/>
  <line x1="9" y1="33" x2="39" y2="15" stroke="#aaddff" stroke-width="2" stroke-linecap="round"/>
  <!-- 각 가지의 측면 돌기 (6방향 × 2쌍) -->
  <!-- 위 가지 -->
  <line x1="24" y1="14" x2="20" y2="18" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="14" x2="28" y2="18" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 아래 가지 -->
  <line x1="24" y1="34" x2="20" y2="30" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="24" y1="34" x2="28" y2="30" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 우상 가지 -->
  <line x1="31" y1="11" x2="29" y2="16" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="31" y1="11" x2="33.5" y2="15" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 좌하 가지 -->
  <line x1="17" y1="37" x2="19" y2="32" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="17" y1="37" x2="14.5" y2="33" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 우하 가지 -->
  <line x1="37" y1="31" x2="32" y2="30" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="37" y1="31" x2="34.5" y2="26.5" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 좌상 가지 -->
  <line x1="11" y1="17" x2="16" y2="18" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="11" y1="17" x2="13.5" y2="21.5" stroke="#aaddff" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 눈 파티클 -->
  <circle cx="8" cy="10" r="1.5" fill="#aaddff" opacity="0.6"/>
  <circle cx="40" cy="8" r="1.2" fill="#aaddff" opacity="0.5"/>
  <circle cx="6" cy="38" r="1.5" fill="#aaddff" opacity="0.5"/>
  <circle cx="42" cy="40" r="1.2" fill="#aaddff" opacity="0.6"/>
  <circle cx="44" cy="22" r="1" fill="#aaddff" opacity="0.5"/>
  <circle cx="4" cy="24" r="1" fill="#aaddff" opacity="0.5"/>
</svg>
