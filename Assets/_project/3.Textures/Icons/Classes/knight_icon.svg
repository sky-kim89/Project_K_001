<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6b2020"/>
      <stop offset="100%" stop-color="#1a0606"/>
    </radialGradient>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="40%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>
    <linearGradient id="guardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#8b6820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <rect width="64" height="64" rx="10" fill="none" stroke="#8b4444" stroke-width="1.5" opacity="0.9"/>
  <!-- Blade glow -->
  <polygon points="32,7 26,43 38,43" fill="#ff5555" opacity="0.15" filter="url(#glow)"/>
  <!-- Sword blade — 듬직하게 넓게 -->
  <polygon points="32,7 26,43 38,43" fill="url(#bladeGrad)" stroke="#888" stroke-width="0.5"/>
  <!-- Blade center ridge (세로 능선) -->
  <polygon points="32,9 31,42 33,42" fill="white" opacity="0.45"/>
  <!-- Crossguard -->
  <rect x="16" y="42" width="32" height="6" rx="3" fill="url(#guardGrad)" stroke="#6b4a10" stroke-width="0.6"/>
  <!-- Crossguard end gems -->
  <circle cx="17" cy="45" r="2.2" fill="#e74c3c" stroke="#8b1a1a" stroke-width="0.5"/>
  <circle cx="47" cy="45" r="2.2" fill="#e74c3c" stroke="#8b1a1a" stroke-width="0.5"/>
  <!-- Grip -->
  <rect x="28" y="48" width="8" height="11" rx="3" fill="#7a4020" stroke="#5a2e10" stroke-width="0.7"/>
  <line x1="28" y1="51.5" x2="36" y2="51.5" stroke="#5a2e10" stroke-width="1" opacity="0.65"/>
  <line x1="28" y1="55" x2="36" y2="55" stroke="#5a2e10" stroke-width="1" opacity="0.65"/>
  <!-- Pommel -->
  <circle cx="32" cy="61" r="4.5" fill="url(#guardGrad)" stroke="#6b4a10" stroke-width="0.6"/>
  <circle cx="32" cy="61" r="2" fill="#ffdd66" opacity="0.9"/>
</svg>
