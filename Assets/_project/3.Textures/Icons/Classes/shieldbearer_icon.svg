<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#104040"/>
      <stop offset="100%" stop-color="#040e0e"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a6a7a"/>
      <stop offset="50%" stop-color="#1a4a5a"/>
      <stop offset="100%" stop-color="#0a2030"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ccdd"/>
      <stop offset="100%" stop-color="#228888"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <rect width="64" height="64" rx="10" fill="none" stroke="#448b8b" stroke-width="1.5" opacity="0.9"/>

  <!-- 방패 글로우 -->
  <path d="M32,7 L52,14 L52,36 Q52,52 32,58 Q12,52 12,36 L12,14 Z"
        fill="#22ccdd" opacity="0.1" filter="url(#glow)"/>

  <!-- 방패 본체 (히터 방패 형태) -->
  <path d="M32,7 L52,15 L52,36 Q52,52 32,58 Q12,52 12,36 L12,15 Z"
        fill="url(#shieldGrad)" stroke="url(#rimGrad)" stroke-width="2.5"/>

  <!-- 방패 테두리 내부 장식선 -->
  <path d="M32,12 L48,18.5 L48,36 Q48,49 32,54 Q16,49 16,36 L16,18.5 Z"
        fill="none" stroke="#44ccdd" stroke-width="0.8" opacity="0.45"/>

  <!-- 중앙 십자 문양 -->
  <!-- 세로 -->
  <rect x="29.5" y="16" width="5" height="32" rx="2" fill="#44ccdd" opacity="0.6"/>
  <!-- 가로 -->
  <rect x="18" y="29.5" width="28" height="5" rx="2" fill="#44ccdd" opacity="0.6"/>
  <!-- 교차점 중앙 보석 -->
  <circle cx="32" cy="32" r="5" fill="#1a8a9a" stroke="#44ccdd" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="2.5" fill="#88eeff" opacity="0.85"/>
  <circle cx="30.5" cy="30.5" r="1" fill="white" opacity="0.7"/>

  <!-- 방패 상단 중앙 리벳 -->
  <circle cx="32" cy="9" r="2.5" fill="#44ccdd" stroke="#228888" stroke-width="0.7"/>
  <!-- 양 옆 어깨 리벳 -->
  <circle cx="14" cy="18" r="2" fill="#44ccdd" stroke="#228888" stroke-width="0.6"/>
  <circle cx="50" cy="18" r="2" fill="#44ccdd" stroke="#228888" stroke-width="0.6"/>
</svg>
